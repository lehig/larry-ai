services:
  db:
    image: postgres:16-alpine
    container_name: ${PROJECT_NAME:-larry-ai}-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 10

  model:
    build:
      context: ./model-py
    container_name: ${PROJECT_NAME:-larry-ai}-model
    environment:
      MODEL_VERSION: v0.1.0
      PYTHONUNBUFFERED: "1"
    ports:
      - "${MODEL_PORT:-8000}:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: ./api-go
    container_name: ${PROJECT_NAME:-larry-ai}-api
    environment:
      PORT: "8080"
      DB_DSN: "postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}?sslmode=disable"
      MODEL_BASE_URL: "http://model:8000"
      DEFAULT_MODEL_VERSION: "v0.1.0"
    ports:
      - "${API_PORT:-8080}:8080"
    depends_on:
      db:
        condition: service_healthy
      model:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
